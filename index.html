<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Логос">
<link rel="manifest" href="/Postulat-of-Logos/manifest.json">
<link rel="apple-touch-icon" href="/Postulat-of-Logos/icons/icon-192.png">
<title>Постулат Логоса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--ink:#1a1a2e;--paper:#f4f0e8;--gold:#c9952a;--grey:#8a8a9a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Spectral',serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
h1{font-size:2.2rem;font-weight:300;font-style:italic;letter-spacing:-0.02em;text-align:center;margin-bottom:6px;}
.sub{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--grey);letter-spacing:0.12em;text-transform:uppercase;text-align:center;margin-bottom:48px;}
.cards{display:flex;flex-direction:column;gap:18px;width:100%;max-width:360px;}
a.card{display:block;border:1.5px solid var(--ink);padding:24px 22px 20px;text-decoration:none;color:var(--ink);transition:background .15s;}
a.card:hover, a.card:active{background:var(--ink);color:var(--paper);}
a.card:hover .dim, a.card:active .dim{color:rgba(255,255,255,0.5);}
.card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.card-title{font-size:1.1rem;font-weight:600;}
.arrow{font-size:1rem;color:var(--grey);}
.card-desc{font-size:0.78rem;line-height:1.6;color:#555;margin-bottom:10px;}
a.card:hover .card-desc, a.card:active .card-desc{color:rgba(255,255,255,0.7);}
.tag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;}
</style>
</head>
<body>
<h1>Постулат Логоса</h1>
<div class="sub">Симулятор решения конфликтов</div>
<div class="cards">
  <a class="card" href="/Postulat-of-Logos/postulate-column.html">
    <div class="card-top">
      <span class="card-title">Версия с колонкой</span>
      <span class="arrow dim">→</span>
    </div>
    <div class="card-desc">Поле из n квадратов n×n в столбец. Конфликты в колонке — горизонтальные перестановки.</div>
    <div class="tag">n квадратов · 1D</div>
  </a>
  <a class="card" href="/Postulat-of-Logos/postulate-sudoku.html">
    <div class="card-top">
      <span class="card-title">Версия судоку</span>
      <span class="arrow dim">→</span>
    </div>
    <div class="card-desc">Поле n²×n² с n² домами. Конфликты по колонке и строке. Двухфазный алгоритм.</div>
    <div class="tag">судоку · 2D · 2 фазы</div>
  </a>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker
    .register('/Postulat-of-Logos/sw.js', {scope: '/Postulat-of-Logos/'})
    .catch(e => console.warn('SW:', e));
}
</script>
</body>
</html>
